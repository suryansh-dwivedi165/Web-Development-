<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./logo.jpg" type="image/x-icon" />
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="Spotify_clone.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main">
      <div class="sidebar">
        <div class="nav">
          <div class="nav-option" style="opacity: 1">
            <i class="fa-solid fa-house"></i>
            <a href="#">Home</a>
          </div>
          <div class="nav-option">
            <i class="fa-solid fa-magnifying-glass"></i>
            <a href="#">Search</a>
          </div>
        </div>
        <div class="library">
          <div class="options">
            <div class="lib-option nav-option">
              <img src="./libraryicon.png" alt="" />
              <a href="#">Your library</a>
            </div>
            <div class="icons">
              <i class="fa-solid fa-plus"></i>
              <i class="fa-sharp fa-solid fa-right-long"></i>
            </div>
          </div>
          <div class="lib-box">
            <div class="box">
              <p class="boxp1">Create your first playlist</p>
              <p class="boxp2">It's easy, we'll help you</p>
              <button class="badge">Create Playlist</button>
            </div>
            <div class="box">
              <p class="boxp1">Let's find some prodcasts to follow</p>
              <p class="boxp2">We'll help you updated on new episodes</p>
              <button class="badge">Browse prodcasts</button>
            </div>
          </div>
        </div>
      </div>
      <div class="main-content">
        <div class="sticky-nav">
            <img src="backwordicon.png" alt="">
            <img src="forwardicon.jpg" alt="">
            <button class="badge">Explore premium</button>
            <button class="badge"><i class="fa-solid fa-download"></i>Install app</button>
            <i class="fa-regular fa-user-vneck"></i>
        </div>
        <div class="cards"></div>
      </div>
      <div class="music-player">music</div>
    </div>
  </body>
</html>
